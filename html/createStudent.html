<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insert Student Data</title>
    <link rel="stylesheet" href="../css/createStudent.css">
</head>
<body>
    <div class="wrapper">
        <form action="" method="post" onsubmit="insertStudent(event)">
            <label for="enrollmentNumber">Enrollment Number:</label>
            <input type="text" id="enrollmentNumber" name="enrollmentNumber" required><br><br>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br><br>
            <label for="email">Email:</label>
            <input type="text" id="email" name="email" required><br><br>
            <label for="department">Department:</label>
            <input type="text" id="department" name="department" required><br><br>
            <label for="contactNumber">Contact Number:</label>
            <input type="text" id="contactNumber" name="contactNumber" required><br><br>
            <button type="submit">Submit Data</button>
            <button type="reset">Reset Data</button>
        </form>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
